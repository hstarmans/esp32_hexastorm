<div class="d-flex flex-column align-items-center gap-1" @click="handleClick($event)">
    
    <div class="d-flex gap-1">
        <div style="width: 3.5rem; height: 3.5rem;"></div> <button type="button" class="btn btn-secondary d-flex justify-content-center align-items-center" 
                style="width: 3.5rem; height: 3.5rem;" data-vector="[0,-1,0]" title="Move Up">
            <i class="bi bi-arrow-up fs-4"></i>
        </button>
        <div style="width: 3.5rem; height: 3.5rem;"></div> </div>
    
    <div class="d-flex gap-1">
        <button type="button" class="btn btn-secondary d-flex justify-content-center align-items-center" 
                style="width: 3.5rem; height: 3.5rem;" data-vector="[1,0,0]" title="Move Left">
            <i class="bi bi-arrow-left fs-4"></i>
        </button>
        
        <div class="d-flex gap-1" style="width: 3.5rem; height: 3.5rem;">
            <button type="button" 
                    class="btn btn-outline-danger w-50 p-0 d-flex align-items-center justify-content-center" 
                    data-command="home"
                    data-axes="[1,0,0]"
                    title="Home X">
                <span class="fw-bold" style="font-size: 0.85rem;">X</span>
            </button>
            <button type="button" 
                    class="btn btn-outline-success w-50 p-0 d-flex align-items-center justify-content-center" 
                    data-command="home"
                    data-axes="[0,1,0]"
                    title="Home Y">
                <span class="fw-bold" style="font-size: 0.85rem;">Y</span>
            </button>
        </div>

        <button type="button" class="btn btn-secondary d-flex justify-content-center align-items-center" 
                style="width: 3.5rem; height: 3.5rem;" data-vector="[-1,0,0]" title="Move Right">
            <i class="bi bi-arrow-right fs-4"></i>
        </button>
    </div>

    <div class="d-flex gap-1">
        <div style="width: 3.5rem; height: 3.5rem;"></div> <button type="button" class="btn btn-secondary d-flex justify-content-center align-items-center" 
                style="width: 3.5rem; height: 3.5rem;" data-vector="[0,1,0]" title="Move Down">
            <i class="bi bi-arrow-down fs-4"></i>
        </button>
        <div style="width: 3.5rem; height: 3.5rem;"></div> </div>

</div>
